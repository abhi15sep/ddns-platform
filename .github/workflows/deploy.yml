name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd server && npm install && npm run lint
      - run: cd dashboard && npm install && npm run lint

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/ddns-platform
            git pull origin main
            cd server && npm install && npm run build
            cd ../dashboard && npm install && npx vite build
            pm2 restart ddns-api
