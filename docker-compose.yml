version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ddns
      POSTGRES_USER: ddnsuser
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: powerdns
      MYSQL_USER: pdns
      MYSQL_PASSWORD: pdnspassword
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./dns/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./dns/init-zone.sql:/docker-entrypoint-initdb.d/02-init-zone.sql

  powerdns:
    image: powerdns/pdns-auth-master:latest
    depends_on:
      - mysql
    ports:
      - "5353:53/tcp"
      - "5353:53/udp"
      - "8081:8081"
    environment:
      - PDNS_gmysql_host=mysql
      - PDNS_gmysql_user=pdns
      - PDNS_gmysql_password=pdnspassword
      - PDNS_gmysql_dbname=powerdns
      - PDNS_launch=gmysql
      - PDNS_api=yes
      - PDNS_api_key=dev-api-key-change-in-production
      - PDNS_webserver=yes
      - PDNS_webserver_address=0.0.0.0
      - PDNS_webserver_port=8081
      - PDNS_webserver_allow_from=0.0.0.0/0

volumes:
  pgdata:
  mysqldata: