# Nginx config for DDNS Platform
# Copy this file to /etc/nginx/sites-available/ddns
# Then: ln -s /etc/nginx/sites-available/ddns /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# Then: sudo certbot --nginx -d ddns.devops-monk.com -d api.devops-monk.com

# DDNS Dashboard (React SPA)
server {
    listen 80;
    server_name ddns.devops-monk.com;

    root /opt/ddns-platform/dashboard/dist;
    index index.html;

    # Serve desktop client download files
    location /downloads/ {
        alias /opt/ddns-platform/client-app/out/;
        autoindex off;
        add_header Content-Disposition 'attachment';
        expires 1d;
    }

    # SPA routing: serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to Node.js backend (port 3001)
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /update {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# DDNS API (separate subdomain — optional, for direct API access)
server {
    listen 80;
    server_name api.devops-monk.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
